<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Manufacturing Blueprint AI | Ultra-High Performance</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-microchip"></i>
                SMART <span>MANUFACTURING</span>
            </div>
            <div class="engine-status">
                <span id="status-badge" class="status-badge status-idle">System Standby</span>
            </div>
        </header>

        <main class="dashboard">
            <!-- Left Panel: Input -->
            <section class="card input-section">
                <h2><i class="fas fa-upload"></i> Input Blueprint</h2>

                <div class="input-group">
                    <label for="imageFile" class="label-heading">Gambar Teknik (.jpg/png)</label>
                    <div class="upload-zone" id="uploadZone">
                        <input type="file" id="imageFile" accept="image/*" hidden>
                        <div id="previewContainer" class="preview-container">
                            <i class="fas fa-cloud-upload-alt upload-icon"></i>
                            <p>Klik atau Seret Gambar ke Sini</p>
                        </div>
                    </div>
                </div>

                <div class="input-group mt-large">
                    <label for="textInput" class="label-heading">Spesifikasi Tamhahan (Opsional)</label>
                    <textarea id="textInput"
                        placeholder="Tempelkan data BOM atau instruksi tambahan di sini..."></textarea>
                </div>

                <button id="startBtn" type="button" class="btn-primary">
                    <span id="btnText">Mulai Analisis AI</span>
                    <div id="loader" class="loader"></div>
                </button>
            </section>

            <!-- Right Panel: Result -->
            <section class="card results-section">
                <h2>
                    <span><i class="fas fa-file-invoice"></i> Laporan Teknis AI</span>
                    <button class="btn-icon" id="copyBtn" title="Copy Result">
                        <i class="far fa-copy"></i>
                    </button>
                </h2>

                <div id="result-content" class="result-area">
                    <div class="placeholder-text">
                        <i class="fas fa-robot"></i>
                        <p>Unggah blueprint untuk melihat analisis mendalam.</p>
                    </div>
                </div>

                <div class="result-footer">
                    <div class="engine-info">
                        <i class="fas fa-brain"></i>
                        <span id="engineBadge">Dual Engine: Qwen2-VL & Qwen 2.5</span>
                    </div>
                    <button id="reasonBtn" class="btn-secondary d-none">
                        <i class="fas fa-magic"></i> Susun Laporan Teknis
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>

</html>
